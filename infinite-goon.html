<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#000000">
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Infinite Goon Screen</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
        }
        .container {
            display: grid;
            grid-template-rows: 1fr 1fr;
            grid-template-columns: 1fr 1fr;
            height: 100%;
            width: 100%;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
            display: none; /* Hide iframes initially */
        }
        .top-left {
            grid-row: 1 / 2;
            grid-column: 1 / 2;
        }
        .top-right {
            grid-row: 1 / 2;
            grid-column: 2 / 3;
        }
        .bottom-left {
            grid-row: 2 / 3;
            grid-column: 1 / 2;
        }
        .bottom-right {
            grid-row: 2 / 3;
            grid-column: 2 / 3;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe src="https://redditp.com/r/SissyFemdom" class="top-left"></iframe>
        <iframe src="https://redditp.com/r/FemboyCum" class="top-right"></iframe>
        <iframe src="https://redditp.com/r/FemBoys" class="bottom-left"></iframe>
        <iframe src="https://redditp.com/r/SissyInspiration" class="bottom-right"></iframe>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const iframes = document.querySelectorAll('iframe');
            
            // Show iframes with a delay
            iframes.forEach((iframe, index) => {
                setTimeout(() => {
                    iframe.style.display = 'block'; // Show the iframe
                }, index * 1000); // Delay each iframe by 1 second times its index
            });

            function shuffleIframes() {
                const container = document.querySelector('.container');
                const shuffledIframes = Array.from(iframes).sort(() => Math.random() - 0.5);

                shuffledIframes.forEach((iframe, index) => {
                    switch (index) {
                        case 0:
                            iframe.classList.remove('top-right', 'bottom-left', 'bottom-right');
                            iframe.classList.add('top-left');
                            break;
                        case 1:
                            iframe.classList.remove('top-left', 'bottom-left', 'bottom-right');
                            iframe.classList.add('top-right');
                            break;
                        case 2:
                            iframe.classList.remove('top-left', 'top-right', 'bottom-right');
                            iframe.classList.add('bottom-left');
                            break;
                        case 3:
                            iframe.classList.remove('top-left', 'top-right', 'bottom-left');
                            iframe.classList.add('bottom-right');
                            break;
                    }
                });
            }

            // Initial shuffle
            shuffleIframes();

            // Shuffle iframes every 20 seconds
            setInterval(shuffleIframes, 60000); // 60000 milliseconds = 60 seconds
        });
    </script>
</body>
</html>
