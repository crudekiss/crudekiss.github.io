<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: 'Roboto Mono', monospace;
            color: #807F80;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            padding: 20px;
            max-width: 90%;
            max-height: 90%;
            margin: 10px;
            color: #807F80;
        }
        h1 {
            margin: 0;
            font-size: 2em;
            color: #DA0020;
            text-transform: uppercase;
        }
        p {
            margin: 10px 0 0;
            font-size: 1.2em;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 1.5em;
            }
            p {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Redirecting...</h1>
        <p>If you are not redirected automatically, <a href="https://crudekiss.itch.io/the-sinister-instinct" style="color: #DA0020; text-decoration: none;">click here</a>.</p>
    </div>
    <script>
        setTimeout(function() {
            window.location.href = 'https://crudekiss.itch.io/the-sinister-instinct';
        }, 3000); // Redirects after 3 seconds
    </script>
</body>
</html>
