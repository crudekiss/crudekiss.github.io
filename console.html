<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Terminal</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: black;
            color: gray;
            margin: 0;
            padding: 0;
        }
        .terminal {
            background-color: black;
            border: 0px solid #333;
            width: 100%;
            height: 90vh;
            margin-top: 5vh;
            overflow-y: scroll; /* Always show vertical scrollbar for scrolling */
            padding: 10px;
            position: relative; /* Ensures scrollbars are properly handled */
        }
        /* Hide scrollbar for WebKit browsers */
        .terminal::-webkit-scrollbar {
            display: none; /* Hide scrollbar for WebKit browsers */
        }
        /* Hide scrollbar for Firefox */
        .terminal {
            scrollbar-width: none; /* Hide scrollbar for Firefox */
        }
        .input-line {
            display: flex;
        }
        .input-line span {
            color: teal;
            margin-right: 5px;
        }
        .input-line input {
            background: transparent;
            border: none;
            color: #cfcfcf;
            width: 100%;
            outline: none;
        }
        .input-line input:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="terminal" id="terminal">
        <div id="output"></div>
        <div class="input-line">
            <span>></span>
            <input type="text" id="input" autofocus>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputField = document.getElementById('input');
            const outputDiv = document.getElementById('output');
            
            function handleCommand(command) {
                if (command === 'cls') {
                    outputDiv.innerHTML = '';
                } else if (command === 'help') {
                    outputDiv.innerHTML += '<br><div>Available commands:</div><div>cls - Clear the screen</div><div>help - Show this help message</div><br>';
                } else {
                    outputDiv.innerHTML += `<div>Invalid command. Use 'help' to see available options.</div>`;
                }
                outputDiv.scrollTop = outputDiv.scrollHeight; // Auto-scroll to the bottom
            }
            
            inputField.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const command = inputField.value.trim();
                    if (command) {
                        outputDiv.innerHTML += `<div>[<span style="color: teal;">~</span>] ${command}</div>`;
                        handleCommand(command);
                        inputField.value = '';
                    }
                    e.preventDefault();
                }
            });
        });
    </script>
</body>
</html>
