<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Terminal</title>
    <style>
        /* Import the Roboto Mono font from Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        /* Apply styles to all elements */
        * {
            box-sizing: border-box; /* Ensures padding and border are included in element's total width and height */
            margin: 0;
            padding: 0;
            font-family: 'Roboto Mono', monospace; /* Set font to Roboto Mono */
            font-size: 16px; /* Uniform font size */
        }
        
        body {
            background-color: #000;
            color: #0f0;
            overflow: hidden; /* Hide scrollbars on the body */
        }
        #terminal {
            padding-left: 20px;
            height: 90vh;
            margin-top: 5vh;
            overflow-y: scroll; /* Allow vertical scrolling */
            overflow-x: hidden; /* Hide horizontal scrollbar */
            display: flex;
            flex-direction: column;
        }
        /* Hide scrollbar for WebKit browsers (Chrome, Safari) */
        #terminal::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for Firefox */
        #terminal {
            scrollbar-width: none;
        }
        .command-line {
            display: flex;
            align-items: center; /* Align items vertically center */
        }
        .command-line span {
            color: #0f0;
            margin-right: 5px; /* Add margin to the right of the prompt */
        }
        .input {
            color: #0f0;
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
        }
        .command-output {
            color: #888; /* Gray color for command output */
        }
        .command-entered {
            color: #0f0; /* Green color for entered commands */
        }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="output"></div>
        <div class="command-line">
            <span>> </span>
            <input id="input" class="input" autofocus>
        </div>
    </div>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const terminal = document.getElementById('terminal');

        const commandDescriptions = {
            hello: "Displays 'Hello, world!'",
            date: "Displays the current date and time",
            echo: "Repeats the text you provide",
            cls: "Clears the terminal screen",
            help: "Lists all available commands or details of a specific command"
        };

        const commands = {
            hello: () => "Hello, world!",
            date: () => new Date().toLocaleString(),
            echo: (args) => args.join(' '),
            cls: () => {
                output.innerHTML = '';
                terminal.scrollTop = terminal.scrollHeight; // Ensure it scrolls to the bottom
            },
            help: (args) => {
                if (args.length === 0) {
                    // List all commands
                    return "Available commands:\n" + Object.keys(commands).join(", ");
                } else {
                    // Display help for specific command
                    const cmd = args[0].toLowerCase();
                    if (commandDescriptions[cmd]) {
                        return `${cmd}: ${commandDescriptions[cmd]}`;
                    } else {
                        return `No help available for: ${cmd}`;
                    }
                }
            }
        };

        function handleCommand(command) {
            const [cmd, ...args] = command.trim().split(/\s+/);
            const lowerCaseCmd = cmd.toLowerCase();
            if (commands[lowerCaseCmd]) {
                const result = typeof commands[lowerCaseCmd] === 'function' ? commands[lowerCaseCmd](args) : commands[lowerCaseCmd];
                return result;
            } else {
                return `Command not found: ${cmd}`;
            }
        }

        function processInput(e) {
            if (e.key === 'Enter' && input.value.trim() !== '') {
                const command = input.value.trim();
                const result = handleCommand(command);

                if (command.toLowerCase() !== 'cls') { // Skip echoing `cls` command
                    output.innerHTML += `<div><span class="command-entered">> ${command}</span></div>`;
                    output.innerHTML += `<div class="command-output">${result.replace(/\n/g, '<br>')}</div>`;
                }

                input.value = '';
                
                // Scroll to the bottom of the terminal
                terminal.scrollTop = terminal.scrollHeight;

                // Re-focus the input field
                input.focus();
            }
        }

        function handleFocus() {
            input.focus();
        }

        // Set initial focus on page load
        window.onload = handleFocus;

        // Maintain focus if the window gains focus
        window.addEventListener('focus', handleFocus, true);

        // Re-focus the input field if it's blurred
        input.addEventListener('blur', handleFocus);

        input.addEventListener('keydown', processInput);
    </script>
</body>
</html>
